spring:
  datasource:
    url: jdbc:h2:mem:mediverse_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 25

mediverse:
  cors:
    allowed-origins: http://localhost:3000
  frontend:
    base-url: http://localhost:3000
  admin:
    emails: admin@test.local
  appointment:
    booking-horizon-days: 7
    cancel-window-hours: 2
  mail:
    from: noreply@test.local
  storage:
    provider: LOCAL
    local:
      base-dir: ${java.io.tmpdir}/mediverse-test-uploads
      public-url-prefix: http://localhost:8080/uploads

jwt:
  secret: test-only-secret-please-replace-with-a-strong-32+char-key
  access-ttl-minutes: 15
  refresh-ttl-days: 7
  issuer: mediverse-test

google:
  oauth:
    client-id: ""
    client-secret: ""

aws:
  region: us-east-1
  s3:
    bucket: mediverse-test
    access-key: ""
    secret-key: ""

gemini:
  api-key: ""
  chat-model: gemini-1.5-flash
  vision-model: gemini-1.5-pro

logging:
  level:
    root: WARN
    com.mediverse: INFO
