spring:
  application:
    name: mediverse

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mediverse}
    username: ${DB_USER:mediverse}
    password: ${DB_PASSWORD:mediversepass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  thymeleaf:
    check-template-location: false

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    include-exception: false

# ---- App-specific config ----
mediverse:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:noreply@mediverse.local}
  admin:
    emails: ${ADMIN_EMAILS:}
  appointment:
    booking-horizon-days: ${APPT_BOOKING_HORIZON_DAYS:7}
    cancel-window-hours: ${APPT_CANCEL_WINDOW_HOURS:2}
  storage:
    provider: ${STORAGE_PROVIDER:LOCAL}
    local:
      base-dir: ${STORAGE_LOCAL_BASE_DIR:./uploads}
      public-url-prefix: ${STORAGE_LOCAL_PUBLIC_URL:http://localhost:8080/uploads}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-replace-with-a-strong-32+char-key}
  access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
  refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
  issuer: mediverse

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${AWS_S3_BUCKET:mediverse-uploads}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

gemini:
  api-key: ${GEMINI_API_KEY:}
  chat-model: ${GEMINI_CHAT_MODEL:gemini-1.5-flash}
  vision-model: ${GEMINI_VISION_MODEL:gemini-1.5-pro}

# ---- Springdoc / Swagger UI ----
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.mediverse: DEBUG
    org.springframework.security: INFO
